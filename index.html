<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Banjara Beats - Pro Music Hub</title>

<meta name="description" content="Latest Banjara Songs, Lyrics, Status & Music Videos">
<meta name="keywords" content="Banjara Songs, Music, Lyrics, Status">

<link rel="stylesheet" href="css/style.css">
<script defer src="js/script.js"></script>
</head>

<body>

<header>
  <div class="logo">🎵 Banjara Beats</div>
  <input type="text" id="search" placeholder="Search songs...">
</header>

<!-- HERO -->
<section class="hero">
  <h1>🔥 Banjara Music Universe</h1>
  <p>Songs | Lyrics | Status | Culture</p>
</section>

<!-- CATEGORY -->
<section class="section">
  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('love')">Love</button>
  <button onclick="filterCategory('dj')">DJ</button>
  <button onclick="filterCategory('sad')">Sad</button>
</section>

<!-- SONG LIST -->
<section class="section">
  <div id="songList" class="grid"></div>
</section>

<!-- VIDEO -->
<section class="section">
  <iframe id="videoPlayer" allowfullscreen></iframe>
</section>

</body>
</html>
