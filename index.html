<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banjara Beats</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">🎵 Banjara Beats</div>
</header>

<!-- HERO -->
<section class="hero">
  <h1>🔥 Banjara Music Universe</h1>
  <p>Songs | Lyrics | Status | Culture</p>
</section>

<!-- CATEGORIES -->
<section class="categories">
  <button>All</button>
  <button>Love</button>
  <button>DJ</button>
  <button>Sad</button>
</section>

<!-- SONG GRID -->
<section class="grid">

  <div class="card">
    <img src="https://via.placeholder.com/300x200">
    <h3>Phupir Chori</h3>
    <p>Singer: Suhasini</p>
    <button>Play</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x200">
    <h3>Love Failure</h3>
    <p>Singer: Mohan</p>
    <button>Play</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x200">
    <h3>DJ Banjara</h3>
    <p>Remix Song</p>
    <button>Play</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x200">
    <h3>Sad Love</h3>
    <p>Emotion Song</p>
    <button>Play</button>
  </div>

</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Banjara Beats | All Rights Reserved</p>
</footer>

</body>
</html>
